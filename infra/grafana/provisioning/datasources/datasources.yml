apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true

  - name: TimescaleDB
    type: postgres
    url: timescaledb:5432
    database: distrosense
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      sslmode: disable
      timescaledb: true