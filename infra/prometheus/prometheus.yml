global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: distrosense-ingestion
    static_configs:
      - targets: ["ingestion:8000"]

  - job_name: distrosense-ml
    static_configs:
      - targets: ["ml-service:8002"]